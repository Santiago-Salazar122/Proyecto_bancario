spring.application.name=banco

# ═══════════════════════════════════════════════════════════════════
# BASE DE DATOS RELACIONAL: MySQL via XAMPP
# ═══════════════════════════════════════════════════════════════════
# XAMPP corre MySQL en el puerto 3306.
# La BD "banco" se crea automáticamente si no existe.
# Si tu XAMPP tiene contraseña de MySQL, escríbela en spring.datasource.password
spring.datasource.url=jdbc:mysql://localhost:3306/banco?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# "update": Hibernate crea las tablas si no existen, las modifica si hay cambios.
# Nunca borra datos existentes.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ═══════════════════════════════════════════════════════════════════
# BASE DE DATOS NO RELACIONAL: MongoDB
# Usado SOLO para la Bitácora de Operaciones (Audit Log)
# ═══════════════════════════════════════════════════════════════════
# Instala MongoDB Community desde mongodb.com
# Córrelo con: mongod (en terminal)
# La BD "banco_audit" se crea sola al primer insert.
spring.data.mongodb.uri=mongodb://localhost:27017/banco_audit

# ═══════════════════════════════════════════════════════════════════
# SERVIDOR
# ═══════════════════════════════════════════════════════════════════
server.port=8080

# ═══════════════════════════════════════════════════════════════════
# REGLA DE NEGOCIO: umbral para transferencias empresariales
# Transferencias de empresa > este monto requieren aprobación del Supervisor
# ═══════════════════════════════════════════════════════════════════
bank.transfer.approval-threshold=5000000
